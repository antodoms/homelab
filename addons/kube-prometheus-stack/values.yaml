kube-prometheus-stack:
  ## Create default rules for monitoring the cluster
  ## Disable rules for unreachable components
  ##
  defaultRules:
    create: true
    rules:
      etcd: false
      kubeScheduler: false
    disabled:
      KubeCPUOvercommit: true
      KubeMemoryOvercommit: true
      KubeletTooManyPods: true
      InfoInhibitor: true

  ## Disable component scraping for the kube controller manager, etcd, and kube-scheduler
  ## These components are not reachable on EKS
  ##
  kubeControllerManager:
    enabled: false
  kubeEtcd:
    enabled: false
  kubeScheduler:
    enabled: false

  prometheus:
    prometheusSpec:
      ## Prometheus StorageSpec for persistent data on AWS EBS
      ## ref: https://github.com/prometheus-operator/prometheus-operator/blob/main/Documentation/user-guides/storage.md
      ##
      storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: mayastor-sc
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 30Gi

  alertmanager:
    config:
      route:
        receiver: keep
        group_by: [alertname, namespace, severity]
        group_wait: 30s
        group_interval: 5m
        repeat_interval: 4h
        routes:
          - matchers:
              - severity = "info"
            receiver: "null"
          - matchers:
              - alertname = "Watchdog"
            receiver: "null"
      receivers:
        - name: "null"
        - name: keep
          webhook_configs:
            - url: "http://keep-backend.keep:8080/alerts/event/prometheus"
              send_resolved: true
      inhibit_rules:
        - source_matchers: [severity = "critical"]
          target_matchers: [severity = "warning"]
          equal: [alertname, namespace]

  prometheusOperator:
    admissionWebhooks:
      failurePolicy: Ignore

  ## additional configuration options available here: https://github.com/prometheus-community/helm-charts/blob/main/charts/kube-prometheus-stack/values.yaml
  grafana:
    serviceAccount:
      create: true
    createNamespace: true
    ingress:
      enabled: false
      # Migrated to Gateway API - see templates/grafana-httproute.yaml
    extraObjects:
    - apiVersion: gateway.networking.k8s.io/v1
      kind: HTTPRoute
      metadata:
        name: grafana
        namespace: "{{ .Release.Namespace }}"
      spec:
        parentRefs:
        - group: gateway.networking.k8s.io
          kind: Gateway
          name: homelab-gateway
          namespace: envoy-gateway-system
          sectionName: https
        hostnames:
        - grafana.homelab.home
        rules:
        - matches:
          - path:
              type: PathPrefix
              value: /
          backendRefs:
          - group: ""
            kind: Service
            name: "{{ .Release.Name }}-grafana"
            port: 80
            weight: 1
    grafana.ini:
      server:
        root_url: ""

    dashboardProviders:
      dashboardproviders.yaml:
        apiVersion: 1
        providers:
        - name: 'default'
          orgId: 1
          folder: ''
          type: file
          disableDeletion: false
          editable: true
          options:
            path: /var/lib/grafana/dashboards/default
