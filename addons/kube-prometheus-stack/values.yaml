kube-prometheus-stack:
  ## Create default rules for monitoring the cluster
  ## Disable rules for unreachable components
  ##
  defaultRules:
    create: true
    rules:
      etcd: false
      kubeScheduler: false

  ## Disable component scraping for the kube controller manager, etcd, and kube-scheduler
  ## These components are not reachable on EKS
  ##
  kubeControllerManager:
    enabled: false
  kubeEtcd:
    enabled: false
  kubeScheduler:
    enabled: false

  prometheus:
    prometheusSpec:
      ## Prometheus StorageSpec for persistent data on AWS EBS
      ## ref: https://github.com/prometheus-operator/prometheus-operator/blob/main/Documentation/user-guides/storage.md
      ##
      storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: mayastor-sc
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 30Gi

  prometheusOperator:
    admissionWebhooks:
      failurePolicy: Ignore

  ## additional configuration options available here: https://github.com/prometheus-community/helm-charts/blob/main/charts/kube-prometheus-stack/values.yaml
  grafana:
    serviceAccount:
      create: true
    createNamespace: true
    ingress:
      enabled: false
      # Migrated to Gateway API - see templates/grafana-httproute.yaml
    extraObjects:
    - apiVersion: gateway.networking.k8s.io/v1
      kind: HTTPRoute
      metadata:
        name: grafana
        namespace: "{{ .Release.Namespace }}"
      spec:
        parentRefs:
        - name: homelab-gateway
          namespace: envoy-gateway-system
          sectionName: https
        hostnames:
        - grafana.homelab.home
        rules:
        - matches:
          - path:
              type: PathPrefix
              value: /
          backendRefs:
          - name: "{{ .Release.Name }}-grafana"
            port: 80
    grafana.ini:
      server:
        root_url: ""

    dashboardProviders:
      dashboardproviders.yaml:
        apiVersion: 1
        providers:
        - name: 'default'
          orgId: 1
          folder: ''
          type: file
          disableDeletion: false
          editable: true
          options:
            path: /var/lib/grafana/dashboards/default
