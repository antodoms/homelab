falco:
  # Use modern eBPF driver with Falco 0.43.1 (kernel 6.12 support)
  driver:
    kind: modern_ebpf

  # Container runtime socket for Talos
  collectors:
    containerd:
      enabled: true
      socket: /run/containerd/containerd.sock

  # Privileged security context required for eBPF probe on Talos
  containerSecurityContext:
    privileged: true

  tty: true

  # Falco engine configuration
  falco:
    json_output: true
    json_include_output_property: true
    log_stderr: true
    log_syslog: false
    log_level: info
    priority: notice
    file_output:
      enabled: false

  # Falcosidekick: dual output — syslog to Wazuh (SIEM/forensics) + webhook to Keep (alerting)
  falcosidekick:
    enabled: true
    replicaCount: 1
    config:
      # Wazuh manager syslog listener (port 514, configured in wazuh extraConf)
      syslog:
        host: "wazuh-manager-master-svc.wazuh.svc.cluster.local"
        port: "514"
        protocol: "tcp"
        minimumpriority: "notice"
      # Keep direct webhook for immediate alerting (bypasses Wazuh rule promotion)
      webhook:
        address: "http://keep-backend.keep:8080/alerts/event/falco"
        minimumpriority: "notice"

  # Suppress noisy homelab rules
  customRules:
    homelab-suppressions.yaml: |-
      # Disable rule that fires on routine k8s node activity (init containers, sidecars, etc.)
      - rule: Read sensitive file untrusted
        override:
          enabled: replace
        enabled: false

      # Extend the "known read sensitive file activities" placeholder macro so that any
      # remaining rules using it skip reads from container runtime paths.
      - macro: user_known_read_sensitive_files_activities
        condition: >
          or fd.name startswith /var/lib/containerd
          or fd.name startswith /var/lib/kubelet
        override:
          condition: append

  # Resource limits for homelab
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 256Mi
