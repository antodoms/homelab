falco:
  # Use modern eBPF driver with Falco 0.43.1 (kernel 6.12 support)
  driver:
    kind: modern_ebpf

  # Container runtime socket for Talos
  collectors:
    containerd:
      enabled: true
      socket: /run/containerd/containerd.sock

  # Privileged security context required for eBPF probe on Talos
  containerSecurityContext:
    privileged: true

  tty: true

  # Falco engine configuration
  falco:
    json_output: true
    json_include_output_property: true
    log_stderr: true
    log_syslog: false
    log_level: info
    priority: debug
    # Write alerts to file for Wazuh agent ingestion
    file_output:
      enabled: true
      keep_alive: false
      filename: /var/log/falco/events.json

  # Mount host path for Falco log output (shared with Wazuh agent)
  mounts:
    volumes:
      - name: falco-logs
        hostPath:
          path: /var/log/falco
          type: DirectoryOrCreate
    volumeMounts:
      - name: falco-logs
        mountPath: /var/log/falco

  # Falcosidekick for forwarding alerts
  falcosidekick:
    enabled: true
    replicaCount: 1

  # Resource limits for homelab
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 256Mi
