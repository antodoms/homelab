apiVersion: openclaw.rocks/v1alpha1
kind: OpenClawInstance
metadata:
  name: openclaw
spec:
  envFrom:
    - secretRef:
        name: openclaw-api-keys
  gateway:
    controlUiOrigins:
      - https://{{ .Values.httproute.hostnames | first }}
  storage:
    persistence:
      enabled: true
      size: 10Gi
