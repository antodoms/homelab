apiVersion: openclaw.rocks/v1alpha1
kind: OpenClawInstance
metadata:
  name: openclaw
spec:
  envFrom:
    - secretRef:
        name: openclaw-api-keys
  gateway:
    controlUiOrigins:
      - https://{{ .Values.httproute.hostnames | first }}
  config:
    mergeMode: overwrite
    raw:
      agents:
        defaults:
          model:
            primary: "openrouter/inclusionai/ling-2.6-1t:free"
  storage:
    persistence:
      enabled: true
      size: 10Gi
  
  initContainers:
    - name: install-models
      image: busybox:1.37
      command:
        - sh
        - -c
        - |
          mkdir -p /data/agents/main/agent
          cp /models-config/models.json /data/agents/main/agent/models.json
      volumeMounts:
        - name: data
          mountPath: /data
        - name: models-config
          mountPath: /models-config
    - name: install-gogcli
      image: curlimages/curl:8.5.0
      command:
        - sh
        - -c
        - |
          curl -fsSL https://github.com/steipete/gogcli/releases/download/v0.12.0/gogcli_0.12.0_linux_amd64.tar.gz \
            -o /tmp/gogcli.tar.gz
          tar -xzf /tmp/gogcli.tar.gz -C /tmp
          cp /tmp/gog /extra-bin/gog
          chmod +x /extra-bin/gog
      volumeMounts:
        - name: extra-bin
          mountPath: /extra-bin

  extraVolumes:
    - name: models-config
      configMap:
        name: openclaw-models
    - name: extra-bin
      emptyDir: {}
    - name: gog-config
      emptyDir: {}
    - name: gog-credentials
      secret:
        secretName: openclaw-api-keys
        items:
          - key: GOG_CLIENT_CREDENTIALS_JSON
            path: gog_credentials.json
    - name: nfsshare
      nfs:
        server: {{ .Values.nfsshare.server }}
        path: {{ .Values.nfsshare.path }}
  extraVolumeMounts:
    - name: extra-bin
      mountPath: /usr/local/extra-bin
    - name: gog-config
      mountPath: /home/openclaw/.config/gog
    - name: gog-credentials
      mountPath: /usr/local/extra-bin/gog_credentials.json
      subPath: gog_credentials.json
      readOnly: true
    - name: nfsshare
      mountPath: /mnt/nas
