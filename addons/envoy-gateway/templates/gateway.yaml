apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: homelab-gateway
  namespace: envoy-gateway-system
  annotations:
    # MetalLB configuration
    metallb.universe.tf/address-pool: default
    {{- if .Values.gateway.loadBalancerIP }}
    metallb.universe.tf/loadBalancerIPs: {{ .Values.gateway.loadBalancerIP | quote }}
    {{- end }}
spec:
  gatewayClassName: homelab-gateway
  listeners:
  - name: http
    protocol: HTTP
    port: 80
    allowedRoutes:
      namespaces:
        from: All
  - name: https
    protocol: HTTPS
    port: 443
    allowedRoutes:
      namespaces:
        from: All
    tls:
      mode: Terminate
      certificateRefs:
      - kind: Secret
        name: homelab-gateway-tls
  infrastructure:
    parametersRef:
      group: gateway.envoyproxy.io
      kind: EnvoyProxy
      name: homelab-gateway-proxy
