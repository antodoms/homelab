{{- if .Values.httproute.enabled -}}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ .Release.Name }}
  labels:
    app.kubernetes.io/name: keep
    app.kubernetes.io/instance: {{ .Release.Name }}
  {{- with .Values.httproute.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- with .Values.httproute.parentRefs }}
  parentRefs:
    {{- toYaml . | nindent 2 }}
  {{- end }}
  {{- with .Values.httproute.hostnames }}
  hostnames:
    {{- toYaml . | nindent 2 }}
  {{- end }}
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /v2
    backendRefs:
    - group: ""
      kind: Service
      name: {{ .Release.Name }}-backend
      port: 8080
      weight: 1
  - matches:
    - path:
        type: PathPrefix
        value: /websocket
    backendRefs:
    - group: ""
      kind: Service
      name: {{ .Release.Name }}-websocket
      port: 6001
      weight: 1
  - matches:
    - path:
        type: PathPrefix
        value: /
    backendRefs:
    - group: ""
      kind: Service
      name: {{ .Release.Name }}-frontend
      port: 3000
      weight: 1
{{- end }}
