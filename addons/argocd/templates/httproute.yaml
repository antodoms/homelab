{{- if (index .Values "argo-cd" "server" "gatewayAPI" "enabled") }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: argocd-server
  namespace: argocd
  annotations:
    cert-manager.io/cluster-issuer: selfsigned
spec:
  parentRefs:
  - name: homelab-gateway
    namespace: envoy-gateway-system
  hostnames:
  - "argocd.{{ .Values.destinationServer | default "homelab.home" }}"
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /
    backendRefs:
    - name: argo-cd-argocd-server
      port: 80
{{- end }}
