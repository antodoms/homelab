transmission:
  enabled: true
  container:
    image: docker.io/linuxserver/transmission
    nodeSelector: {}
    port:
      utp: 9091
      peer: 51413
  service:
    utp:
      type: ClusterIP
      port: 9091
      # if type is NodePort, nodePort must be set
      nodePort:
      # Defines an additional LB service, requires cloud provider service or MetalLB
      extraLBService: false
      extraLBAnnotations: {}
    peer:
      type: ClusterIP
      port: 51413
      # if type is NodePort, nodePort and nodePortUDP must be set
      nodePort:
      nodePortUDP:
      # Defines an additional LB service, requires cloud provider service or MetalLB
      extraLBService: false
      extraLBAnnotations: {}
  ingress:
    enabled: false
    annotations:
      cert-manager.io/cluster-issuer: selfsigned
    path: /transmission
    tls:
      enabled: true
  httproute:
    enabled: true
    annotations: {}
    parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: homelab-gateway
      namespace: envoy-gateway-system
      sectionName: https
    hostnames:
    - mediaserver.homelab.home
    rules:
    - matches:
      - path:
          type: PathPrefix
          value: /transmission
      backendRefs:
      - group: ""
        kind: Service
        name: transmission
        port: 9091
        weight: 1
  config:
    auth:
      enabled: false
      username: ""
      password: ""
  resources:
    limits:
      cpu: "200m"
      memory: "4Gi"
    requests:
      cpu: "100m"
      memory: "2Gi"

