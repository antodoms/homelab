# Default values for k8s-mediaserver.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

general:
  ingress_host: k8s-mediaserver.k8s.test
  plex_ingress_host: k8s-plex.k8s.test
  jellyfin_ingress_host: k8s-jelly.k8s.test
  mediafusion_ingress_host: k8s-mediafusion.k8s.text
  image_tag: latest
  podDistribution: cluster # can be "spread" or "cluster"
  #UID to run the process with
  puid: 1002
  # GID to run the process with
  pgid: 1000
  # Persistent storage selections and pathing
  storage:
    customVolume: false # set to true if not using a PVC (must provide volume below)
    pvcName: mediaserver-pvc
    accessMode: ""
    size: 5Gi
    pvcStorageClass: ""
    # the path starting from the top level of the pv you're passing. If your share is server.local/share/, then tv is server.local/share/media/tv
    subPaths:
      tv: media/tv
      movies: media/movies
      downloads: downloads
      transmission: transmission
      sabnzbd: sabnzbd
      config: config
    volumes: {}
    #  hostPath:
    #    path: /mnt/share
  ingress:
    ingressClassName: nginx
    annotations:
      cert-manager.io/cluster-issuer: selfsigned
  nodeSelector: {}

sonarr:
  enabled: true
  container:
    image: docker.io/linuxserver/sonarr
    nodeSelector: {}
    port: 8989
  service:
    type: ClusterIP
    port: 8989
    nodePort:
    extraLBService: false
    extraLBAnnotations: {}
    # Defines an additional LB service, requires cloud provider service or MetalLB
  ingress:
    enabled: false
    annotations:
      cert-manager.io/cluster-issuer: selfsigned
    path: /sonarr
    tls:
      enabled: true
  httproute:
    enabled: true
    annotations: {}
    parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: homelab-gateway
      namespace: envoy-gateway-system
      sectionName: https
    hostnames:
    - mediaserver.homelab.home
    rules:
    - matches:
      - path:
          type: PathPrefix
          value: /sonarr
      backendRefs:
      - group: ""
        kind: Service
        name: sonarr
        port: 8989
        weight: 1
  resources:
    limits:
      cpu: "200m"
      memory: "4Gi"
    requests:
      cpu: "100m"
      memory: "2Gi"
  volume:
    name: pvc-sonarr-config
    storageClassName: mayastor-sc
    annotations: {}
    labels: {}
    accessModes: ReadWriteOnce
    storage: 5Gi
    selector: {}

