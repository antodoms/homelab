apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: bootstrap-addons
  namespace: 'argocd'
spec:
  project: default
  source:
    repoURL: https://github.com/antodoms/homelab.git
    targetRevision: main
    path: chart
    helm:
      values: |
        metallb:
          addressPool: ${cluster_lb_ip_range}
        openebs:
          workers:
            ${indent(12,yamlencode(worker_nodes))}
        argoCd:
          configs:
            credentialTemplates:
              ${indent(14, argo_repository_secrets)}
            repositories:
              ${indent(14, argo_repositories)}
      parameters:
      - name: ingressDomain
        value: ${ingress_domain}
      - name: clusterLoadBalancerIpRange
        value: ${cluster_lb_ip_range}
      - name: NfsServerIp
        value: ${nfs_server_ip}
      - name: MediaServerNFSPath
        value: ${media_server_nfs_path}
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true