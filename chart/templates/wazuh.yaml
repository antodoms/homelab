{{- if and (.Values.wazuh) (.Values.wazuh.enable) -}}
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: wazuh
  namespace: {{ .Values.argoNamespace | default "argocd" }}
  finalizers:
  - resources-finalizer.argocd.argoproj.io
spec:
  project: {{ .Values.argoProject | default "default" }}
  source:
    repoURL: {{ .Values.repoUrl }}
    path: addons/wazuh
    targetRevision: {{ .Values.targetRevision }}
    helm:
      values: |
        wazuh:
        {{- toYaml .Values.wazuh | nindent 10 }}
      parameters:
      - name: wazuh.httproute.hostnames[0]
        value: wazuh.{{ .Values.ingressDomain }}
  destination:
    server: {{ .Values.destinationServer | default "https://kubernetes.default.svc" }}
    namespace: wazuh
  ignoreDifferences:
    - group: "*"
      kind: "*"
      managedFieldsManagers:
        - argocd-controller
        - argocd-application-controller
      jsonPointers:
        - /metadata/annotations
        - /metadata/managedFields
        - /metadata/labels
  syncPolicy:
    syncOptions:
    - RespectIgnoreDifferences=true
    - CreateNamespace={{ .Values.wazuh.createNamespace }}
    - ServerSideApply=true
    automated:
      selfHeal: true
      prune: true
    retry:
      limit: 1
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 1m
{{- end -}}
