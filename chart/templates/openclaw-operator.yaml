{{- if and (.Values.openclawOperator) (.Values.openclawOperator.enable) -}}
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: openclaw-operator
  namespace: {{ .Values.argoNamespace | default "argocd" }}
  finalizers:
  - resources-finalizer.argocd.argoproj.io
spec:
  project: {{ .Values.argoProject | default "default" }}
  source:
    repoURL: {{ .Values.repoUrl }}
    path: addons/openclaw-operator
    targetRevision: {{ .Values.targetRevision }}
    helm:
      values: |
        openclaw-operator:
        {{- toYaml .Values.openclawOperator | nindent 10 }}
      parameters:
      - name: httproute.hostnames[0]
        value: openclaw.{{ .Values.ingressDomain }}
      - name: nfsshare.server
        value: {{ .Values.NfsServerIp }}
      - name: nfsshare.path
        value: {{ .Values.MediaServerNFSPath }}
  destination:
    server: {{ .Values.destinationServer | default "https://kubernetes.default.svc" }}
    namespace: openclaw-operator-system
  syncPolicy:
    syncOptions:
      - CreateNamespace={{ .Values.openclawOperator.createNamespace }}
      - ServerSideApply=true
    automated:
      selfHeal: true
      prune: true
    retry:
      limit: 1
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 1m
{{- end -}}
