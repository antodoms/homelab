{{- if ((.Values.adguard).enable) }}
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: adguard
  namespace: {{ .Values.argoNamespace | default "argocd" }}
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: {{ .Values.argoProject | default "default" }}
  source:
    repoURL: {{ required "repoUrl value is required" .Values.repoUrl }}
    path: addons/adguard
    targetRevision: {{ .Values.targetRevision }}
    helm:
      values: |
        adguard:
        {{- toYaml .Values.adguard | nindent 10 }}
  destination:
    server: {{ .Values.destinationServer | default "https://kubernetes.default.svc" }}
    namespace: adguard
  syncPolicy:
    automated:
      selfHeal: true
      prune: true
    syncOptions:
      - CreateNamespace={{ .Values.adguard.createNamespace }}
    retry:
      limit: 1
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 1m
  {{- end -}}