{{- if and (.Values.homebridge) (.Values.homebridge.enable) -}}
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: homebridge
  namespace: {{ .Values.argoNamespace | default "argocd" }}
  finalizers:
  - resources-finalizer.argocd.argoproj.io
spec:
  project: {{ .Values.argoProject | default "default" }}
  source:
    repoURL: {{ .Values.repoUrl }}
    path: addons/homebridge
    targetRevision: {{ .Values.targetRevision }}
    helm:
      values: |
        homebridge:
        {{- toYaml .Values.homebridge | nindent 10 }}
  destination:
    server: {{ .Values.destinationServer | default "https://kubernetes.default.svc" }}
    namespace: homebridge
  syncPolicy:
    syncOptions:
      - RespectIgnoreDifferences=true
      - CreateNamespace={{ .Values.homebridge.createNamespace }}
    automated:
      selfHeal: true
      prune: true
    retry:
      limit: 1
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 1m
{{- end -}}