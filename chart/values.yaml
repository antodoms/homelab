# Global Values
repoUrl: 'https://github.com/antodoms/homelab.git'
targetRevision: main
destinationServer: ''
argoNamespace: argocd
argoProject: ''

# ArgoCD Values
argoCd:
  enable: true
  createNamespace: true

argoCdImageUpdater:
  enable: true
  createNamespace: true

certManager:
  enable: true
  createNamespace: true

trustManager:
  enable: true
  createNamespace: false

cilium:
  enable: false
  createNamespace: true

adguard:
  enable: true
  createNamespace: true

# MetalLB
metallb:
  enable: true
  addressPool: ""

# Ingress Controller Values
# Nginx has been replaced with Envoy Gateway due to licensing changes
ingressNginx:
  enable: false
  createNamespace: true

# Envoy Gateway (Gateway API)
envoyGateway:
  enable: true
  createNamespace: true

# Kube Prometheus Stack
kubePrometheusStack:
  enable: true
  createNamespace: true

# VPA Values
vpa:
  enable: true
  createNamespace: true

localPathStorage:
  enable: false
  createNamespace: true

openebs:
  enable: true
  createNamespace: true

# uses kube-system namespace
talosCcm:
  enable: false

mediaServerOperator:
  enable: true
  createNamespace: false # namespace is created by terraform
  general:
    storage:
      customVolume: true

kubeshark:
  enable: false
  createNamespace: true

dockerRegistry:
  enable: true
  createNamespace: true

# CloudNativePG operator
cloudnativePg:
  enable: true
  createNamespace: true

# OpenTelemetry operator (required by OpenObserve collector)
opentelemetryOperator:
  enable: true
  createNamespace: true

# OpenObserve - observability platform (logs, metrics, traces)
openobserve:
  enable: true
  createNamespace: true

# OpenObserve collector - OTEL collector for logs, metrics, traces
openobserveCollector:
  enable: true
  createNamespace: true

# OpenClaw Operator
openclawOperator:
  enable: true
  createNamespace: false # namespace is created by terraform

# Falco - runtime security monitoring
falco:
  enable: true
  createNamespace: true