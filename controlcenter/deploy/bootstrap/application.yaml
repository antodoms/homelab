apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ${app_name}
  namespace: 'argocd'
  annotations:
    argocd-image-updater.argoproj.io/image-list: registry.homelab.home/${app_name}:${version}
spec:
  project: default
  source:
    repoURL: https://github.com/stakater/application.git
    targetRevision: master
    path: application
    helm:
      values: |
        applicationName: ${app_name}
        deployment:
          enabled: true
          image:
            repository: registry.homelab.home/${app_name}
            tag: ${version}
            pullPolicy: IfNotPresent
          envFrom:
            app_secret:
              type: secret
              name: ${app_secret_name}
          ports:
            - containerPort: 3000
              name: http
              protocol: TCP
          command: ["/bin/sh", "-c", "/rails/bin/rails s -b 0.0.0.0"]
          containerSecurityContext:
            enabled: true
            privileged: false
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            runAsNonRoot: false
            capabilities:
              drop:
                - ALL
          resources:
            limits:
              memory: 1Gi
              cpu: 500m
            requests:
              memory: 512Mi
              cpu: 100m
        persistence:
          enabled: true
          storageClass: mayastor-sc
          mountPVC: true
          accessMode: ReadWriteOnce
          mountPath: /rails/storage
          storageSize: 30Gi
        service:
          enabled: true
          type: ClusterIP
          ports:
            - port: 3000
              name: http
              protocol: TCP
              targetPort: 3000
        ingress:
          enabled: true
          ingressClassName: nginx
          hosts:
            - host: ${app_name}.${ingress_domain}
              paths:
              - path: /
                serviceName: ${app_name}
                servicePort: http
                pathType: ImplementationSpecific
          annotations:
            cert-manager.io/cluster-issuer: selfsigned
          tls:
            - secretName: ${app_name}-tls
              hosts:
                - ${app_name}.${ingress_domain}
  destination:
    server: https://kubernetes.default.svc
    namespace: ${app_namespace}
    project: default
  syncPolicy:
    automated:
      prune: true