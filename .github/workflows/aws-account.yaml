name: aws-account
on:
  push:
    paths:
        - .github/workflows/aws-account.yaml
        - aws-account/**
  workflow_dispatch:

permissions:
    id-token: write
    contents: read
    actions: write

jobs:
  upload:
    strategy:
        matrix:
          region: [ap-southeast-2]
          account: [homelab]
          include:
              - account: homelab
                account_id: 780008751869
        fail-fast: false

    name: ${{ matrix.account }}-${{ matrix.region }}
    concurrency:
      group: ${{ matrix.account }}-${{ matrix.region }}-aws-account
      cancel-in-progress: true

    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v3

      - name: configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v1
        with:
          aws-region: ${{ matrix.region }}
          role-to-assume: arn:aws:iam::${{ matrix.account_id }}:role/github-action

      - name: Plan terraform changes
        shell: bash
        env:
          REGION: ${{ matrix.region }}
          ACCOUNT: ${{ matrix.account }}
        run: |
          cd $GITHUB_WORKSPACE/aws-account
          make plan-out

      - name: Apply terraform changes
        if: github.ref == 'refs/heads/main'
        shell: bash
        env:
          REGION: ${{ matrix.region }}
          ACCOUNT: ${{ matrix.account }}
        run: |
          cd $GITHUB_WORKSPACE/aws-account
          make ci-apply